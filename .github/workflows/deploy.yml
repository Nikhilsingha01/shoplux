name: Deploy to Replit

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.15.4 # Use stable version of pnpm matching lockfile

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Typecheck
        run: pnpm run typecheck

      - name: Build Project
        run: pnpm run build

      - name: Trigger Replit Deploy Hook
        if: secrets.REPLIT_DEPLOY_HOOK != ''
        run: |
          echo "Triggering Replit Deployment..."
          curl -s -X POST "${{ secrets.REPLIT_DEPLOY_HOOK }}"
          echo "Deployment trigger dispatched successfully."
